{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>Dashboard</h1>
    <p>Overview of your running performance</p>
</div>

{% for key, title in chart_meta.items() %}
<div style="background:white; border-radius:10px; padding:24px; margin-bottom:24px;
            box-shadow:0 1px 4px rgba(0,0,0,0.08);">
    <h2 style="font-size:1rem; margin-bottom:16px; color:#4a5568;">{{ title }}</h2>
    <img src="/chart/{{ key }}" style="width:100%;" alt="{{ title }}">
</div>
{% endfor %}

{% endblock %}
